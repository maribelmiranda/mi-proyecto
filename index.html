<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">

    <title>Leaflet - Search</title>

    <!-- Carga librerias de Leaflet -->
    <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- plugin para realizar busquedas-->   
    <link href="https://cdn.jsdelivr.net/npm/leaflet-search@4.0.0/dist/leaflet-search.src.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/leaflet-search@4.0.0/dist/leaflet-search.src.min.js"></script>

    <!-- plugin para marcar la posición del mouse -->
    <link href="https://cdn.jsdelivr.net/npm/leaflet-mouse-position@1.2.0/src/L.Control.MousePosition.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/leaflet-mouse-position@1.2.0/src/L.Control.MousePosition.min.js"></script>

    <!-- Estilos css -->
    <link href="monu.css" rel="stylesheet">

    <!-- Archivo geojson-->
    <script src="SalamancaMonumental.js"></script>
    
      
    <style type:="text/css">       
        html, #map {                
            height: 100%;                   
        }                      
    </style>
</head>


<body>

    <header>
        <h2>Visor de edificios históricos de Salamanca</h2>
    </header>

    <aside>
        <div class="titulonav">Buscar un lugar</div>
        <div id="findbox"></div>

        <footer>
            Para buscar un lugar escriba su nombre en la parte de arriba. Para obtener información sobre el
            lugar pinche en el icono correspondiente.
        </footer>
    </aside>

    <!-- Alberga mapa -->       
    <div id="map"> </div>   
          
    <script>       

        // Crea mapa
        var map = L.map('map').setView([40.962, -5.665], 16);
        
        // Crea capa base
        L.tileLayer('https://{s}.tile.osm.org/{z}/{x}/{y}.png').addTo(map);
       
        // Accesa al archivo geojson
        var featuresLayer = new L.GeoJSON(SalamancaMonumental, {
            onEachFeature: function(feature, marker) {
                marker.bindPopup("<ul><h3>" + feature.properties.Nombre + "</h3><li>Estilo: " +
                    feature.properties.Estilo + "</li><li>Siglo: " + feature.properties.Siglo + "</li></ul>");
            }
        }).addTo(map);

        // Selecciona el lugar
        var searchControl = new L.Control.Search({
            layer: featuresLayer,
            propertyName: 'Nombre',
            circleLocation: true,
            initial: false,
            container: 'findbox',
            collapse: false
        });

        // Inicializa el searchControl
        map.addControl(searchControl);

        // Control de visualización de coordenadas del mouse
        L.control.mousePosition().addTo(map);

    </script>

</body>
</html>
