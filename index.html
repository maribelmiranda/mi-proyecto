<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />    
    <title>Escuelas UNAM</title>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;        
      }

      #map {
        width: 100%;
        height: 100vh;
      }

      .control {
        position: absolute;
        top: 10px;
        right: 10px;
        background: white;
        padding: 8px;
        font-family: sans-serif;
        z-index: 1;
      }

      #map-container {
        position: relative;
      }
      #map-title {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(203, 201, 226, 0.9);
        padding: 8px 16px;
        font-size: 20px;
        font-weight: bold;
        border-radius: 6px;
        z-index: 1;
        font-family: Arial, Helvetica, sans-serif;
      }

      .maplibregl-ctrl-scale {
        width: 80px !important;
        text-align: center;
      }
    </style>
  </head>


  <body>
  
    <div id="map-container">
    <div id="map-title">Escuelas de la UNAM</div>
    <div id="map"></div>
  </div>

    <script type="module" src="/src/ML_map01.js"></script>

  </body>
</html>
